name: Feature Handoff to Linear

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  feature-handoff:
    if: startsWith(github.head_ref, 'early-users/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Claude co-authored commits
        id: claude-check
        run: |
          CLAUDE_COMMITS=$(git log origin/main..HEAD --format="%H" \
            | while read hash; do
                if git log -1 --format="%b" "$hash" | grep -qi "Co-Authored-By.*Claude"; then
                  echo "$hash"
                fi
              done)

          if [ -z "$CLAUDE_COMMITS" ]; then
            echo "has_claude=false" >> "$GITHUB_OUTPUT"
            echo "claude_commit_count=0" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(echo "$CLAUDE_COMMITS" | wc -l | tr -d ' ')
            echo "has_claude=true" >> "$GITHUB_OUTPUT"
            echo "claude_commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Build feature summary
        id: context
        run: |
          BRANCH="${{ github.head_ref }}"
          FEATURE_NAME="${BRANCH#early-users/}"
          TOTAL_COMMITS=$(git log --oneline origin/main..HEAD | wc -l | tr -d ' ')
          FILE_COUNT=$(git diff --name-only origin/main..HEAD | wc -l | tr -d ' ')

          # ── Group commits by feature area ──
          # Extract unique prefixes from conventional commit messages
          declare -A FEATURE_GROUPS
          declare -A FEATURE_ITEMS

          while IFS= read -r line; do
            hash="${line%% *}"
            msg="${line#* }"

            # Skip merge commits and chores
            echo "$msg" | grep -qiE "^(Merge|chore:)" && continue

            # Determine feature group from commit prefix
            if echo "$msg" | grep -qi "restyle"; then
              group="Funnel Restyler"
            elif echo "$msg" | grep -qiE "(hero|section.*variant|page.builder|stats.bar|feature.grid|social.proof|scroll.reveal|animation|position.rule|SectionRenderer|gradient.shift|section.editor|SectionsManager)"; then
              group="Enhanced Page Builder"
            elif echo "$msg" | grep -qiE "(standards.*(loop|review|learning)|feature.handoff|analyze-standards)"; then
              group="AI Standards Learning Loop"
            elif echo "$msg" | grep -qiE "(mcp|cli.*command|magnetlab_)"; then
              group="MCP & CLI Tools"
            elif echo "$msg" | grep -qiE "(knowledge|ai.brain|position.synthesis|brain)"; then
              group="AI Brain Integration"
            elif echo "$msg" | grep -qiE "(email.sequence)"; then
              group="Email Sequences"
            elif echo "$msg" | grep -qi "^docs:"; then
              group="Documentation"
            elif echo "$msg" | grep -qi "^fix:"; then
              group="Bug Fixes"
            elif echo "$msg" | grep -qi "^feat:"; then
              group="Features"
            else
              group="Other"
            fi

            FEATURE_GROUPS["$group"]=1
            FEATURE_ITEMS["$group"]+="- ${msg}"$'\n'
          done < <(git log --oneline origin/main..HEAD)

          # ── Group changed files by directory ──
          AREAS=$(git diff --name-only origin/main..HEAD | sed 's|/[^/]*$||' | sort | uniq -c | sort -rn | head -15)

          # ── Find design docs ──
          DESIGN_DOCS=$(git diff --name-only origin/main..HEAD | grep -E "docs/plans/.*design" || true)
          IMPL_PLANS=$(git diff --name-only origin/main..HEAD | grep -E "docs/plans/" | grep -v "design" || true)
          FEATURE_DOCS=$(git diff --name-only origin/main..HEAD | grep -E "^docs/[^/]+\.md$" || true)

          # ── Build description ──
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "description<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"

          cat >> "$GITHUB_OUTPUT" <<HEADER
          ## AI-Built Feature Branch: ${FEATURE_NAME}

          **PR:** [#${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})
          **Branch:** \`${BRANCH}\`
          **Scope:** ${TOTAL_COMMITS} commits, ${FILE_COUNT} files changed
          **Claude Co-Authored:** ${{ steps.claude-check.outputs.claude_commit_count }} commits

          ---

          ### Feature Areas
          HEADER

          # Write each feature group
          for group in "Funnel Restyler" "Enhanced Page Builder" "AI Standards Learning Loop" "AI Brain Integration" "MCP & CLI Tools" "Email Sequences" "Features" "Bug Fixes" "Documentation" "Other"; do
            if [ -n "${FEATURE_ITEMS[$group]}" ]; then
              ITEM_COUNT=$(echo "${FEATURE_ITEMS[$group]}" | grep -c "^-" || true)
              echo "" >> "$GITHUB_OUTPUT"
              echo "#### ${group} (${ITEM_COUNT} commits)" >> "$GITHUB_OUTPUT"
              echo "" >> "$GITHUB_OUTPUT"
              echo "${FEATURE_ITEMS[$group]}" >> "$GITHUB_OUTPUT"
            fi
          done

          cat >> "$GITHUB_OUTPUT" <<AREAS_SECTION

          ### Code Areas Touched

          \`\`\`
          ${AREAS}
          \`\`\`
          AREAS_SECTION

          if [ -n "$DESIGN_DOCS" ] || [ -n "$FEATURE_DOCS" ]; then
            echo "" >> "$GITHUB_OUTPUT"
            echo "### Documentation" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            if [ -n "$DESIGN_DOCS" ]; then
              echo "**Design Docs:**" >> "$GITHUB_OUTPUT"
              echo "$DESIGN_DOCS" | sed 's/^/- /' >> "$GITHUB_OUTPUT"
            fi
            if [ -n "$IMPL_PLANS" ]; then
              echo "" >> "$GITHUB_OUTPUT"
              echo "**Implementation Plans:**" >> "$GITHUB_OUTPUT"
              echo "$IMPL_PLANS" | sed 's/^/- /' >> "$GITHUB_OUTPUT"
            fi
            if [ -n "$FEATURE_DOCS" ]; then
              echo "" >> "$GITHUB_OUTPUT"
              echo "**Feature Docs:**" >> "$GITHUB_OUTPUT"
              echo "$FEATURE_DOCS" | sed 's/^/- /' >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "feature_name=$FEATURE_NAME" >> "$GITHUB_OUTPUT"
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_commits=$TOTAL_COMMITS" >> "$GITHUB_OUTPUT"

      - name: Create Linear issue
        id: create-issue
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TITLE="[Review] ${FEATURE_NAME} — ${{ steps.context.outputs.total_commits }} commits, ${{ steps.context.outputs.file_count }} files (PR #${{ github.event.pull_request.number }})"
          FEATURE_NAME="${{ steps.context.outputs.feature_name }}"

          ESCAPED_DESC=$(echo '${{ steps.context.outputs.description }}' | jq -Rs .)

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --argjson desc "$ESCAPED_DESC" \
            '{
              query: "mutation CreateIssue($input: IssueCreateInput!) { issueCreate(input: $input) { success issue { id identifier url title } } }",
              variables: {
                input: {
                  title: $title,
                  description: $desc,
                  teamId: "c7f962be-0a7e-470b-9d61-ccf0808aaa7d",
                  projectId: "43e6d56e-b1dc-43bd-8631-d99070bb942b",
                  stateId: "f2412f79-de1d-4cf5-a7ff-2e5f9308280a",
                  labelIds: [
                    "23784952-472d-455a-a2bd-4cf7cdf95ea8",
                    "2f30c1ef-0178-4d5b-9a3e-cd7713b4b07f",
                    "46736281-ed8d-4f9d-8d2d-f6eb9d25a6a6"
                  ]
                }
              }
            }')

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "$PAYLOAD" \
            https://api.linear.app/graphql)

          SUCCESS=$(echo "$RESPONSE" | jq -r '.data.issueCreate.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Linear API error:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          ISSUE_ID=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.identifier')
          ISSUE_URL=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.url')
          ISSUE_TITLE=$(echo "$RESPONSE" | jq -r '.data.issueCreate.issue.title')

          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const issueId = '${{ steps.create-issue.outputs.issue_id }}';
            const issueUrl = '${{ steps.create-issue.outputs.issue_url }}';
            const hasClaude = '${{ steps.claude-check.outputs.has_claude }}';
            const claudeCount = '${{ steps.claude-check.outputs.claude_commit_count }}';
            const fileCount = '${{ steps.context.outputs.file_count }}';
            const totalCommits = '${{ steps.context.outputs.total_commits }}';

            const body = [
              `### 🔗 Developer Review Issue Created`,
              ``,
              `**[${issueId}](${issueUrl})** in Experimental Feature Pipeline`,
              ``,
              `| | |`,
              `|---|---|`,
              `| Commits | ${totalCommits} (${claudeCount} Claude co-authored) |`,
              `| Files | ${fileCount} |`,
              `| Labels | \`ai-built\` \`needs-dev-review\` |`,
              ``,
              `The Linear issue contains a feature-grouped summary. Review there and break into sub-issues as needed.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
